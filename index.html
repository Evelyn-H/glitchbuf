<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>glitchbuf</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="controls">
    <div class="field">
      <label for="file">input image</label>
      <input type="file" id="file" accept="image/*">
    </div>
    <div class="field seed-row">
      <label for="seed">seed</label>
      <input type="text" id="seed" spellcheck="false">
      <button id="new-seed">randomise</button>
    </div>
    <div id="canvas-pane">
      <div id="no-image">no image loaded</div>
      <div id="loading">rendering…</div>
      <div id="canvas-wrap">
        <span id="preview-label">preview</span>
        <canvas id="canvas"></canvas>
      </div>
    </div>
    <div class="field script-field">
      <label for="code">script</label>
      <textarea id="code" spellcheck="false">select 0.2 0.3 (echo 0.25 -6)
bitcrush 4
noise -30</textarea>
    </div>
    <div class="buttons">
      <button id="run">run</button>
      <button id="download">download png</button>
    </div>
    <pre id="error"></pre>
  </div>
  <script src="https://unpkg.com/tone/build/Tone.js"></script>
  <script src="dist/glitchbuf.js"></script>
</body>
</html>
